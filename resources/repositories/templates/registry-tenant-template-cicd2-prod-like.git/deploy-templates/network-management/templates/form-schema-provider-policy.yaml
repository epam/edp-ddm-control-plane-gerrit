kind: NetworkPolicy
apiVersion: networking.k8s.io/v1
metadata:
  name: form-schema-provider-policy
spec:
  podSelector:
    matchLabels:
      app: form-schema-provider
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: form-submission-validation
        - podSelector:
            matchLabels:
              app: kong
        - namespaceSelector:
            matchLabels:
              name: {{ .Release.Namespace }}
  policyTypes:
    - Ingress
