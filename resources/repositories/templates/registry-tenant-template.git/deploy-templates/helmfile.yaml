  labels:
    type: remote
    update_scc: true
    repoURL: git@gitbud.epam.com:mdtu-ddm/low-code-platform/platform/backend/applications/bpms.git
    path: components/registry/
    stream: master
  chart: /opt/repositories/bpms/deploy-templates
  version: 1.3.0-SNAPSHOT.34
