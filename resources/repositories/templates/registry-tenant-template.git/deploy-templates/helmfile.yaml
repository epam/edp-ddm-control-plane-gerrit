helmDefaults:
  wait: true
  timeout: 1800
  createNamespace: true
missingFileHandler: Warn
repositories:
- name: kong
  url: https://charts.konghq.com
- name: bitnami
  url: https://charts.bitnami.com/bitnami
releases:
- name: istio-configuration
  namespace: '{{ env "NAMESPACE" }}'
  labels:
    type: local
    update_scc: false
  chart: istio-configuration
  values:
  - values.yaml
  - values.gotmpl
  missingFileHandler: Warn
  hooks:
  - events:
    - postsync
    showlogs: true
    command: oc
    args:
    - label
    - --overwrite
    - namespace
    - '{{`{{.Release.Namespace}}`}}'
    - istio-injection=enabled
  - events:
    - postsync
    showlogs: true
    command: oc
    args:
    - label
    - --overwrite
    - namespace
    - '{{`{{.Release.Namespace}}`}}'
    - kiali-enabled=true
  - events:
    - postsync
    showlogs: true
    command: oc
    args:
    - label
    - --overwrite
    - namespace
    - '{{`{{.Release.Namespace}}`}}'
    - type=registry
- name: network-management
  namespace: '{{ env "NAMESPACE" }}'
  labels:
    type: local
    update_scc: false
  chart: network-management
  values:
  - values.yaml
  - values.gotmpl
  missingFileHandler: Warn
  needs:
  - '{{ env "NAMESPACE" }}/istio-configuration'
- name: registry-auth
  namespace: '{{ env "NAMESPACE" }}'
  labels:
    type: local
    update_scc: false
  chart: registry-auth
  values:
  - values.yaml
  - values.gotmpl
  missingFileHandler: Warn
  needs:
  - '{{ env "NAMESPACE" }}/istio-configuration'
  - '{{ env "NAMESPACE" }}/network-management'
- name: bpms
